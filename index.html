<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4EE;--bg-alt:#EDEADF;--text:#1C1917;--text-muted:#57534E;--text-light:#78716C;
  --border:#D6D3CD;--border-light:#E7E5DF;
  --meta:#64748B;--meta-bg:rgba(100,116,139,.07);
  --ign:#92400E;--ign-bg:rgba(146,64,14,.06);
  --sed:#3F6212;--sed-bg:rgba(63,98,18,.06);
  --font-h:'Playfair Display',Georgia,serif;
  --font-b:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-m:'JetBrains Mono','Fira Code',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
h1,h2,h3,h4,h5{font-family:var(--font-h);font-weight:700;line-height:1.2}
.slide-vp{position:relative;width:100%;max-width:1280px;margin:0 auto}
.slide-fr{position:relative;width:100%;padding-bottom:56.25%;overflow:hidden;background:var(--bg);border:1px solid var(--border-light);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.slide-in{position:absolute;inset:0;display:flex;flex-direction:column;padding:clamp(1.2rem,2.5vw,2.5rem);overflow-y:auto;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.a-in{animation:fadeUp .55s var(--ease) both}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}.d5{animation-delay:.4s}
.sidebar{position:fixed;top:0;left:0;width:272px;height:100vh;background:var(--bg);border-right:1px solid var(--border);z-index:40;transform:translateX(-100%);transition:transform .3s var(--ease);overflow-y:auto;padding:1.4rem .9rem}
.sidebar.open{transform:translateX(0)}
.sb-ov{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:35;opacity:0;pointer-events:none;transition:opacity .3s ease}
.sb-ov.vis{opacity:1;pointer-events:all}
.sb-card{padding:.55rem .75rem;margin-bottom:.35rem;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .18s ease;font-size:.78rem}
.sb-card:hover{background:var(--bg-alt);border-color:var(--border)}
.sb-card.act{background:var(--bg-alt);border-color:var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tb{display:flex;align-items:center;justify-content:center;gap:.7rem;padding:.65rem 1.2rem;max-width:1280px;margin:.8rem auto 0}
.tb-btn{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:white;cursor:pointer;transition:all .18s ease;color:var(--text-muted);padding:0 .5rem;gap:.3rem;font-family:var(--font-b)}
.tb-btn:hover{background:var(--bg-alt);border-color:var(--text-light);color:var(--text)}
.tb-btn.on{background:var(--text);color:white;border-color:var(--text)}
.tb-lbl{font-size:.78rem;color:var(--text-light);font-weight:500;font-variant-numeric:tabular-nums}
.tb-sep{width:1px;height:20px;background:var(--border)}
.spec-img{width:100%;height:100%;object-fit:cover;border-radius:7px;cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s ease}
.spec-img:hover{transform:scale(1.015);box-shadow:0 6px 28px rgba(0,0,0,.12)}
.img-ph{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:var(--bg-alt);border-radius:7px;color:var(--text-light);font-size:.8rem;font-style:italic}
.mo{position:fixed;inset:0;background:rgba(12,10,9,.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:0;transition:opacity .3s ease;pointer-events:none}
.mo.open{opacity:1;pointer-events:all}
.mo-c{max-width:90vw;max-height:85vh;position:relative}
.mo-c img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:8px;box-shadow:0 16px 64px rgba(0,0,0,.4)}
.mo-cap{text-align:center;color:#D6D3CD;margin-top:.9rem;font-size:.85rem;font-style:italic;max-width:620px;margin-left:auto;margin-right:auto;line-height:1.5}
.mo-x{position:absolute;top:-2.5rem;right:0;background:none;border:none;color:#A8A29E;cursor:pointer;font-size:1.4rem;transition:color .2s ease}
.mo-x:hover{color:white}
.tag{display:inline-block;padding:.18rem .55rem;border-radius:999px;font-size:.65rem;font-weight:600;letter-spacing:.025em;text-transform:uppercase}
.t-m{background:var(--meta-bg);color:var(--meta)}
.t-i{background:var(--ign-bg);color:var(--ign)}
.t-s{background:var(--sed-bg);color:var(--sed)}
.card{padding:.85rem 1rem;border-radius:9px;line-height:1.55}
.card-m{background:var(--meta-bg);border-left:3px solid var(--meta)}
.card-i{background:var(--ign-bg);border-left:3px solid var(--ign)}
.card-s{background:var(--sed-bg);border-left:3px solid var(--sed)}
.card-n{background:var(--bg-alt);border-left:3px solid var(--border)}
.card h4{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.045em;margin-bottom:.3rem}
.card p,.card div{font-size:.8rem;line-height:1.55}
.dt{width:100%;border-collapse:collapse;font-size:.75rem}
.dt th{text-align:left;padding:.45rem .6rem;font-weight:600;font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text-light);border-bottom:2px solid var(--border);background:var(--bg-alt)}
.dt td{padding:.4rem .6rem;border-bottom:1px solid var(--border-light);vertical-align:top;line-height:1.45}
.dt tr:last-child td{border-bottom:none}
.hr{height:1px;background:var(--border-light);margin:.25rem 0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

mjx-container[jax="CHTML"]{font-size:103%!important}

  .slide-in{position:relative!important;height:100vh}
}
@media(max-width:768px){
  .slide-in{padding:1rem}
  .tb{flex-wrap:wrap;gap:.4rem}
  .sidebar{width:250px}
}
</style>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

/* ═══════════════════ MATHJAX RE-TYPESET HOOK ═══════════════════ */
function useMathJax(deps) {
  useEffect(() => {
    const id = setTimeout(() => {
      try {
        if (window.MathJax) {
          if (window.MathJax.startup && window.MathJax.startup.document) {
            window.MathJax.startup.document.state(0);
          }
          if (window.MathJax.texReset) window.MathJax.texReset();
          if (window.MathJax.typesetPromise) window.MathJax.typesetPromise().catch(()=>{});
        }
      } catch(e){}
    }, 120);
    return () => clearTimeout(id);
  }, deps);
}

/* ═══════════════════ LaTeX FORMULA CONSTANTS ═══════════════════ */
const L = {
  // Minerals
  ser: "$\\text{KAl}_2(\\text{AlSi}_3\\text{O}_{10})(\\text{OH})_2$",
  chl: "$(\\text{Mg,Fe,Al})_6(\\text{Si,Al})_4\\text{O}_{10}(\\text{OH})_8$",
  qtz: "$\\text{SiO}_2$",
  plag:"$\\text{Na}_{1-x}\\text{Ca}_x\\text{Al}_{1+x}\\text{Si}_{3-x}\\text{O}_8$",
  taug:"$(\\text{Ca,Na})(\\text{Mg,Ti,Fe,Al})(\\text{Si,Al})_2\\text{O}_6$",
  neph:"$\\text{Na}_3\\text{K}(\\text{Al}_4\\text{Si}_4\\text{O}_{16})$",
  orth:"$\\text{KAlSi}_3\\text{O}_8$",
  calc:"$\\text{CaCO}_3$",
  // PT
  pPhy:"$P \\approx 0.2\\text{--}0.4\\text{ GPa}$",
  tPhy:"$T \\approx 300\\text{--}400^\\circ\\text{C}$",
  kbar:"$2\\text{--}4\\text{ kbar}$",
  // Ages & values
  scs: "$32\\text{--}17\\text{ Ma}$",
  melt:"$<\\!10\\%$",
  phot:"$<\\!50\\text{ m}$",
  hT:  "$>\\!600^\\circ\\text{C}$",
  // Geochemical
  olPlCpx:"$\\text{Ol}\\text{--}\\text{Pl}\\text{--}\\text{Cpx}$",
  nbTa:"$\\text{Nb}\\text{--}\\text{Ta}$",
  tio2:"$\\text{TiO}_2$",
  al2o3:"$\\text{Al}_2\\text{O}_3$",
  hfse:"HFSE",
};

/* ═══════════════════ ICON HELPER ═══════════════════ */
function Icon({name,size=18}) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({nodes:[el],attrs:{width:size,height:size}});
    }
  }, [name, size]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',lineHeight:0}}/>;
}

/* ═══════════════════ SVG GEOLOGIC BACKGROUNDS ═══════════════════ */
function GeoBg({type}) {
  const S = {position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'};
  if (type === 'metamorphic') {
    const d = [];
    for (let i=0;i<16;i++){
      const y=35+i*45;
      d.push(<path key={i} d={`M0 ${y} Q160 ${y-20+(i%3)*9},320 ${y+7} T640 ${y-5} T960 ${y+11} T1280 ${y-3}`} fill="none" stroke="#64748B" strokeWidth="1.1" opacity={.035+(i%3)*.006}/>);
    }
    return <svg viewBox="0 0 1280 720" style={S}>{d}</svg>;
  }
  if (type === 'igneous') {
    const p=[];
    const c=[[150,110],[380,80],[620,170],[860,95],[1080,150],[90,340],[330,310],[560,390],[800,330],[1030,370],[190,540],[430,510],[680,590],[930,530],[1130,610],[40,190],[280,640],[530,240],[760,570],[980,240]];
    c.forEach(([cx,cy],i)=>{
      const n=5+(i%3),r=38+(i%4)*11;
      const pts=Array.from({length:n},(_,j)=>{const a=(j/n)*Math.PI*2+i*.3;return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');
      p.push(<polygon key={i} points={pts} fill="none" stroke="#92400E" strokeWidth=".9" opacity={.03+(i%3)*.005}/>);
    });
    return <svg viewBox="0 0 1280 720" style={S}>{p}</svg>;
  }
  if (type === 'sedimentary') {
    const s=[];
    const f=[[190,170],[580,340],[980,190],[340,540],[780,570],[140,410],[1080,390],[480,140],[880,440],[1180,270]];
    f.forEach(([cx,cy],i)=>{
      const rx=48+(i%3)*14,ry=20+(i%2)*7,rot=-18+(i%5)*11;
      for(let r=0;r<3;r++){const sc=1-r*.27;s.push(<ellipse key={`${i}-${r}`} cx={cx} cy={cy} rx={rx*sc} ry={ry*sc} fill="none" stroke="#3F6212" strokeWidth=".7" opacity={.028+r*.005} transform={`rotate(${rot} ${cx} ${cy})`}/>);}
      for(let j=0;j<4;j++){const a=(j/4)*Math.PI+rot*Math.PI/180;s.push(<line key={`${i}-s${j}`} x1={cx} y1={cy} x2={cx+rx*.65*Math.cos(a)} y2={cy+ry*.65*Math.sin(a)} stroke="#3F6212" strokeWidth=".45" opacity=".022"/>);}
    });
    return <svg viewBox="0 0 1280 720" style={S}>{s}</svg>;
  }
  const e=[];
  for(let i=0;i<7;i++){const y=70+i*95;e.push(<path key={i} d={`M0 ${y} Q320 ${y-14},640 ${y+9} T1280 ${y}`} fill="none" stroke="#78716C" strokeWidth=".7" opacity=".022"/>);}
  return <svg viewBox="0 0 1280 720" style={S}>{e}</svg>;
}

/* ═══════════════════ IMAGE COMPONENT ═══════════════════ */
function Img({src,alt,caption,onClick,style={}}) {
  const [err,setErr] = useState(false);
  if (err) return <div className="img-ph" style={style}><span>{"⬡ "+(alt||'Specimen')}</span></div>;
  return <img src={src} alt={alt} className="spec-img" style={style}
    onError={()=>setErr(true)}
    onClick={()=>onClick&&onClick({src,alt,caption})}
    loading="lazy"/>;
}

/* ═══════════════════ IMAGE MODAL ═══════════════════ */
function Modal({data,onClose}) {
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[onClose]);
  return (
    <div className={`mo ${data?'open':''}`} onClick={onClose}>
      {data&&<div className="mo-c" onClick={e=>e.stopPropagation()}>
        <button className="mo-x" onClick={onClose}>✕</button>
        <img src={data.src} alt={data.alt} onError={e=>{e.target.style.display='none';}}/>
        {data.caption&&<div className="mo-cap">{data.caption}</div>}
      </div>}
    </div>
  );
}

/* ═══════════════════ SLIDE METADATA ═══════════════════ */
const SLIDES = [
  {id:1, title:'High-Yield Lithological Triad', sub:'Structural, Magmatic, and Stratigraphic Overview', type:'neutral', short:'Overview'},
  {id:2, title:'Phyllite', sub:'Mineral Chemistry, Crystal Growth, and Optical Luster', type:'metamorphic', short:'Phyllite'},
  {id:3, title:'Essexite', sub:'Alkaline Monzogabbro Classification and Sub-Ophitic Textures', type:'igneous', short:'Essexite'},
  {id:4, title:'Permian Limestone', sub:'Paleo-Tethyan Ramp Facies and Fusulinid Biostratigraphy', type:'sedimentary', short:'Limestone'},
  {id:5, title:'Petrogenetic Pathways', sub:'Metamorphic Reactions and Melt Fractionation', type:'neutral', short:'Petrogenesis'},
  {id:6, title:'North Palawan Block', sub:'Rifting, Drift, and Collision', type:'sedimentary', short:'NPB Drift'},
  {id:7, title:'Metamorphic Basements', sub:'Philippine Subduction and Metamorphism', type:'metamorphic', short:'PH Basements'},
  {id:8, title:'Potassic Volcano-Plutonic Belts', sub:'Oligocene–Miocene Complexes in Northern Luzon', type:'igneous', short:'N. Luzon Belts'},
  {id:9, title:'Alkaline Ore Systems', sub:'Dinkidi and Runruno Porphyries', type:'igneous', short:'Ore Deposits'},
  {id:10,title:'Tectonic Synthesis', sub:'Terrane Accretion and Suture Geometries', type:'neutral', short:'Synthesis'},
];
function typeClr(t){return t==='metamorphic'?'var(--meta)':t==='igneous'?'var(--ign)':t==='sedimentary'?'var(--sed)':'var(--text-light)';}
function tagCls(t){return t==='metamorphic'?'t-m':t==='igneous'?'t-i':t==='sedimentary'?'t-s':'';}
function cardCls(t){return t==='metamorphic'?'card-m':t==='igneous'?'card-i':t==='sedimentary'?'card-s':'card-n';}

/* ═══════════════════════════════════════════════════════════════
   SLIDE 1 — TITLE
   ═══════════════════════════════════════════════════════════════ */
function S1() {
  return (
    <div style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',height:'100%',textAlign:'center',gap:'1.2rem'}}>
      <div className="a-in" style={{fontSize:'.7rem',fontWeight:600,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--text-light)'}}>
        Interactive Geological Presentation
      </div>
      <h1 className="a-in d1" style={{fontSize:'clamp(1.8rem,4.2vw,3.2rem)',fontWeight:800,lineHeight:1.1,letterSpacing:'-.02em',maxWidth:'800px'}}>
        High-Yield Lithological Triad
      </h1>
      <div className="a-in d2" style={{width:'80px',height:'3px',background:'linear-gradient(90deg,var(--meta),var(--ign),var(--sed))',borderRadius:'2px'}}/>
      <p className="a-in d3" style={{fontSize:'clamp(.95rem,1.6vw,1.25rem)',fontFamily:'var(--font-h)',fontWeight:400,fontStyle:'italic',color:'var(--text-muted)',maxWidth:'600px'}}>
        Phyllite &nbsp;·&nbsp; Essexite &nbsp;·&nbsp; Permian Limestone
      </p>
      <div className="a-in d4" style={{display:'flex',gap:'.6rem',marginTop:'.3rem'}}>
        <span className="tag t-m">Metamorphic</span>
        <span className="tag t-i">Igneous</span>
        <span className="tag t-s">Sedimentary</span>
      </div>
      <div className="a-in d5" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.8rem',marginTop:'1rem',maxWidth:'720px',fontSize:'.76rem',lineHeight:1.5,color:'var(--text-muted)',textAlign:'left'}}>
        <div className="card card-m">
          <h4 style={{color:'var(--meta)'}}>Metamorphic</h4>
          <p>Lepidoblastic sheen, Barrovian devolatilization, greenschist-facies foliation</p>
        </div>
        <div className="card card-i">
          <h4 style={{color:'var(--ign)'}}>Igneous</h4>
          <p>Foid-bearing plutonic lattices, silica-undersaturated fractional crystallization</p>
        </div>
        <div className="card card-s">
          <h4 style={{color:'var(--sed)'}}>Sedimentary</h4>
          <p>Chambered calcareous walls, photic-zone carbonate productivity</p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SLIDE 2 — PHYLLITE
   ═══════════════════════════════════════════════════════════════ */
function S2({oc}) {
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:'.8rem'}}>
      <div className="a-in" style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
        <span className="tag t-m">Metamorphic</span>
        <h2 style={{fontSize:'clamp(1.2rem,2.4vw,1.75rem)'}}>Phyllite</h2>
        <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
        <span style={{fontSize:'.7rem',color:'var(--text-light)'}}>Mineral Chemistry · Crystal Growth · Optical Luster</span>
      </div>
      <div className="a-in d1" style={{display:'grid',gridTemplateColumns:'1fr 1.4fr',gap:'1rem',flex:1,minHeight:0}}>
        {/* Image */}
        <div style={{display:'flex',flexDirection:'column',gap:'.5rem'}}>
          <div style={{flex:1,borderRadius:'9px',overflow:'hidden',minHeight:'180px'}}>
            <Img src="images/phyllite.jpg" alt="Phyllite hand specimen" caption="Phyllite hand specimen exhibiting diagnostic silky phyllitic sheen — specular reflection from aligned microcrystalline sericite and chlorite sheets. Wavy crenulation cleavage surfaces visible." onClick={oc}/>
          </div>
          <div style={{fontSize:'.68rem',color:'var(--text-light)',fontStyle:'italic',textAlign:'center'}}>
            Hand specimen — phyllitic sheen with crenulation cleavage
          </div>
        </div>
        {/* Data */}
        <div style={{display:'flex',flexDirection:'column',gap:'.5rem',overflow:'auto'}}>
          <div className="card card-m">
            <h4 style={{color:'var(--meta)'}}>Essential Mineralogy</h4>
            <div style={{fontSize:'.79rem',lineHeight:1.7}}>
              <div style={{marginBottom:'.2rem'}}><strong>Sericite</strong> — {L.ser}</div>
              <div style={{marginBottom:'.2rem'}}><strong>Chlorite</strong> — {L.chl}</div>
              <div><strong>Quartz</strong> — {L.qtz}</div>
            </div>
          </div>
          <div className="card card-m">
            <h4 style={{color:'var(--meta)'}}>Textures &amp; Optical Luster</h4>
            <p><strong>Lepidoblastic to nematoblastic</strong> foliation defining phyllitic cleavage. Uniform <strong>specular reflection</strong> off parallel microcrystalline mica sheets produces the diagnostic <strong>silky phyllitic sheen</strong>. Post-crystallization <strong>wavy crenulation cleavages</strong> indicate polyphase deformation.</p>
          </div>
          <div className="card card-m">
            <h4 style={{color:'var(--meta)'}}>P–T Conditions</h4>
            <p>{"Lower greenschist facies boundary: "+""}{L.tPhy}{", "}{L.pPhy} ({L.kbar}). Transitional Barrovian stage between slate and schist.</p>
          </div>

            <div style={{width:'26px',height:'26px',borderRadius:'6px',background:'var(--ign)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:'.7rem',fontWeight:700}}>Au</div>
            <h4 style={{fontSize:'.82rem',color:'var(--ign)',fontFamily:'var(--font-h)'}}>Runruno Au–Mo Epithermal</h4>
          </div>
          <div className="card card-i" style={{flex:1}}>
            <h4 style={{color:'var(--ign)'}}>Deposit Character</h4>
            <p>High-sulfidation epithermal Au–Mo deposit genetically linked to the essexitic volcanic-plutonic complex. Shallow emplacement with advanced argillic alteration overprinting earlier potassic cores.</p>
          </div>
          <div className="card card-i">
            <h4 style={{color:'var(--ign)'}}>Geochemical Signatures</h4>
            <p>{"Low "}{L.tio2}{", low HFSE, high "}{L.al2o3}{" — representing late-stage island-arc magmatic evolution. These signatures fingerprint the evolved, subduction-modified mantle source."}</p>
          </div>
        </div>
      </div>
      <div className="a-in d3" style={{padding:'.55rem .85rem',background:'var(--ign-bg)',borderRadius:'8px',fontSize:'.74rem',color:'var(--text-muted)',lineHeight:1.5,textAlign:'center',borderLeft:'3px solid var(--ign)'}}>
        <strong>Key insight:</strong> Both deposits are hosted within <strong>quartz-undersaturated</strong> alkaline intrusions — a globally rare but economically significant association requiring specialized exploration models.
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SLIDE 10 — TECTONIC SYNTHESIS
   ═══════════════════════════════════════════════════════════════ */
function S10() {
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:'.7rem'}}>
      <div className="a-in">
        <h2 style={{fontSize:'clamp(1.2rem,2.4vw,1.7rem)',marginBottom:'.15rem'}}>Tectonic Synthesis</h2>
        <p style={{fontSize:'.78rem',color:'var(--text-muted)'}}>Terrane Accretion and Suture Geometries of the Western Philippine Margin</p>
      </div>
      <div className="a-in d1" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',flex:1,minHeight:0}}>
        <div style={{display:'flex',flexDirection:'column',gap:'.45rem'}}>
          <div className="card card-n" style={{borderLeftColor:'var(--meta)'}}>
            <h4 style={{color:'var(--meta)'}}>Mindoro Suture Zone</h4>
            <p>The suture is marked by <strong>sheared tectonic slices</strong> and <strong>serpentinized mantle peridotite bodies</strong> — remnants of the consumed oceanic lithosphere between the passive Eurasian margin (NPB) and the intra-oceanic arcs of the PMB.</p>
          </div>
          <div className="card card-n" style={{borderLeftColor:'var(--ign)'}}>
            <h4 style={{color:'var(--ign)'}}>Collision Dynamics</h4>
            <p>The passive Eurasian margin (represented by the NPB with its Permian limestones) collided with the intra-oceanic arc systems of the PMB. This collision drove:</p>
            <div style={{fontSize:'.76rem',marginTop:'.3rem',lineHeight:1.55}}>
              <div>• <strong>Structural transposition</strong> — regional folding and thrust stacking</div>
              <div>• <strong>Regional metamorphism</strong> — greenschist-facies phyllite generation</div>
              <div>• <strong>Metallogenic activity</strong> — porphyry/epithermal belt emplacement</div>
            </div>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'.45rem'}}>
          <div className="card card-n" style={{borderLeftColor:'var(--sed)'}}>
            <h4 style={{color:'var(--sed)'}}>Crustal Accretion</h4>
            <p>Progressive terrane accretion shaped the western Philippine margin through successive episodes of subduction, collision, and back-arc extension. Each episode added crustal material and generated distinct lithological assemblages:</p>
            <div style={{fontSize:'.76rem',marginTop:'.3rem',lineHeight:1.55}}>
              <div><span className="tag t-m" style={{fontSize:'.6rem',padding:'.1rem .35rem'}}>META</span> Phyllites &amp; schists — collision metamorphism</div>
              <div style={{marginTop:'.15rem'}}><span className="tag t-i" style={{fontSize:'.6rem',padding:'.1rem .35rem'}}>IGN</span> Essexites &amp; syenites — back-arc magmatism</div>
              <div style={{marginTop:'.15rem'}}><span className="tag t-s" style={{fontSize:'.6rem',padding:'.1rem .35rem'}}>SED</span> Permian limestones — passive-margin stratigraphy</div>
            </div>
          </div>
          <div className="card card-n">
            <h4 style={{color:'var(--text-muted)'}}>Geological Footprint</h4>
            <p>The three lithologies of the triad are the direct products of the three fundamental tectonic processes operating in the Philippine archipelago: <strong>collision metamorphism</strong>, <strong>back-arc magmatism</strong>, and <strong>passive-margin sedimentation</strong> — unified by terrane accretion along the western Pacific convergent margin.</p>
          </div>
        </div>
      </div>
      <div className="a-in d3" style={{textAlign:'center',fontSize:'.72rem',color:'var(--text-light)',padding:'.3rem'}}>
        High-Yield Lithological Triad &nbsp;·&nbsp; Philippine Petrology &nbsp;·&nbsp; Structural, Magmatic, and Stratigraphic Overview
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [cur,setCur] = useState(0);
  const [sb,setSb] = useState(false);
  const [play,setPlay] = useState(false);
  const [modal,setModal] = useState(null);
  const [print,setPrint] = useState(false);
  const [sKey,setSKey] = useState(0);
  const timer = useRef(null);
  const N = SLIDES.length;

  // MathJax re-typeset on every slide change and print toggle
  useMathJax([cur, print, sKey]);

  const go = useCallback(i => { if(i>=0&&i<N){setCur(i);setSKey(k=>k+1);} },[N]);
  const next = useCallback(() => go((cur+1)%N), [cur,N,go]);
  const prev = useCallback(() => go((cur-1+N)%N), [cur,N,go]);

  // Auto-play
  useEffect(() => {
    if(play){timer.current=setInterval(next,6000);}else{clearInterval(timer.current);}
    return()=>clearInterval(timer.current);
  },[play,next]);

  // Keyboard
  useEffect(() => {
    const h = e => {
      if(modal&&e.key==='Escape'){setModal(null);return;}
      if(e.key==='Escape'){setSb(false);return;}
      if(e.key==='ArrowRight')next();
      if(e.key==='ArrowLeft')prev();
      if(e.key===' '){e.preventDefault();setPlay(p=>!p);}
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[next,prev,modal]);

  // Print
  const doPrint = () => {
    setPrint(true);
    setTimeout(()=>{
      // Re-typeset all slides for print, then open print dialog
      if(window.MathJax&&window.MathJax.typesetPromise){
        window.MathJax.startup.document.state(0);
        window.MathJax.typesetPromise().then(()=>window.print()).catch(()=>window.print());
      } else { window.print(); }
      setTimeout(()=>setPrint(false),1000);
    },400);
  };

  const oc = d => setModal(d);

  const renderSlide = i => {
    switch(i){
      case 0: return <S1/>;
      case 1: return <S2 oc={oc}/>;
      case 2: return <S3 oc={oc}/>;
      case 3: return <S4 oc={oc}/>;
      case 4: return <S5/>;
      case 5: return <S6/>;
      case 6: return <S7/>;
      case 7: return <S8/>;
      case 8: return <S9/>;
      case 9: return <S10/>;
      default: return null;
    }
  };

  /* ── PRINT MODE ── */
  if(print){
    return(
      <div className="print-mode">
        {SLIDES.map((s,i)=>(
          <div key={i} className="slide-vp">
            <div className="slide-fr" style={{pageBreakAfter:i<N-1?'always':'auto'}}>
              <GeoBg type={s.type}/>
              <div className="slide-in">{renderSlide(i)}</div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  /* ── NORMAL MODE ── */
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',justifyContent:'center',padding:'1.2rem .8rem'}}>
      {/* Sidebar overlay */}
      <div className={`sb-ov ${sb?'vis':''}`} onClick={()=>setSb(false)}/>
      {/* Sidebar */}
      <div className={`sidebar ${sb?'open':''}`}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <h3 style={{fontSize:'.85rem',fontWeight:700}}>Slides</h3>
          <button onClick={()=>setSb(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-light)',fontSize:'1rem'}}>✕</button>
        </div>
        {SLIDES.map((s,i)=>(
          <div key={i} className={`sb-card ${i===cur?'act':''}`} onClick={()=>{go(i);setSb(false);}}>
            <div style={{display:'flex',alignItems:'center',gap:'.4rem',marginBottom:'.15rem'}}>
              <span style={{fontSize:'.68rem',fontWeight:700,color:typeClr(s.type),fontVariantNumeric:'tabular-nums'}}>{String(i+1).padStart(2,'0')}</span>
              <span style={{fontSize:'.74rem',fontWeight:600}}>{s.short}</span>
            </div>
            <div style={{fontSize:'.64rem',color:'var(--text-light)',lineHeight:1.3}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Slide viewport */}
      <div className="slide-vp">
        <div className="slide-fr">
          <GeoBg type={SLIDES[cur].type}/>
          <div className="slide-in" key={sKey} style={{animation:'fadeUp .5s cubic-bezier(.4,0,.2,1) both'}}>
            {renderSlide(cur)}
          </div>
        </div>
      </div>

      {/* Toolbar */}
      <div className="tb">
        <button className="tb-btn" onClick={()=>setSb(o=>!o)} title="Slide index"><Icon name="list" size={15}/></button>
        <div className="tb-sep"/>
        <button className="tb-btn" onClick={prev} title="Previous (←)"><Icon name="chevron-left" size={15}/></button>
        <span className="tb-lbl" style={{minWidth:'46px',textAlign:'center'}}>{cur+1} / {N}</span>
        <button className="tb-btn" onClick={next} title="Next (→)"><Icon name="chevron-right" size={15}/></button>
        <div className="tb-sep"/>
        <button className={`tb-btn ${play?'on':''}`} onClick={()=>setPlay(p=>!p)} title="Auto-play (Space)"><Icon name={play?'pause':'play'} size={13}/></button>
        <div className="tb-sep"/>
        <button className="tb-btn" onClick={doPrint} title="Export to PDF"><Icon name="printer" size={13}/><span style={{fontSize:'.7rem',fontWeight:500}}>PDF</span></button>
      </div>

      {/* Tip bar */}
      <div className="tip" style={{textAlign:'center',marginTop:'.5rem',fontSize:'.68rem',color:'var(--text-light)',opacity:.65}}>
        ← → Navigate &nbsp;·&nbsp; Space: play/pause &nbsp;·&nbsp; Esc: close panels &nbsp;·&nbsp; Click images to zoom
      </div>

      {/* Image modal */}
      <Modal data={modal} onClose={()=>setModal(null)}/>
    </div>
  );
}

/* ── MOUNT ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
