<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>High-Yield Lithological Triad — Phyllite · Essexite · Permian Limestone</title>
<meta name="description" content="Interactive geological presentation on the High-Yield Lithological Triad: Phyllite, Essexite, and Permian Fusulinid Limestone from the Philippine archipelago."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4EE;--bg-alt:#EDEADF;--text:#1C1917;--text-muted:#57534E;--text-light:#78716C;
  --border:#D6D3CD;--border-light:#E7E5DF;
  --meta-blue:#64748B;--meta-bg:rgba(100,116,139,.07);
  --ign-ochre:#92400E;--ign-bg:rgba(146,64,14,.06);
  --sed-sage:#3F6212;--sed-bg:rgba(63,98,18,.06);
  --accent:#8B5CF6;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --slide-ratio:56.25%;
  --transition:cubic-bezier(.4,0,.2,1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
h1,h2,h3,h4,h5{font-family:var(--font-display);font-weight:700;line-height:1.2}

/* Slide container 16:9 */
.slide-viewport{position:relative;width:100%;max-width:1280px;margin:0 auto}
.slide-frame{position:relative;width:100%;padding-bottom:var(--slide-ratio);overflow:hidden;background:var(--bg);border:1px solid var(--border-light);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.slide-inner{position:absolute;inset:0;display:flex;flex-direction:column;padding:clamp(1.5rem,3vw,3rem);overflow:hidden}

/* Slide transitions */
.slide-enter{opacity:0;transform:translateX(30px)}
.slide-enter-active{opacity:1;transform:translateX(0);transition:opacity .5s var(--transition),transform .5s var(--transition)}
.slide-exit{opacity:1;transform:translateX(0)}
.slide-exit-active{opacity:0;transform:translateX(-30px);transition:opacity .35s var(--transition),transform .35s var(--transition)}

/* Content animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fadeInUp .6s var(--transition) both}
.anim-d1{animation-delay:.1s}.anim-d2{animation-delay:.2s}.anim-d3{animation-delay:.3s}.anim-d4{animation-delay:.4s}.anim-d5{animation-delay:.5s}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:var(--bg);border-right:1px solid var(--border);z-index:40;transform:translateX(-100%);transition:transform .35s var(--transition);overflow-y:auto;padding:1.5rem 1rem}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:35;opacity:0;pointer-events:none;transition:opacity .3s ease}
.sidebar-overlay.visible{opacity:1;pointer-events:all}
.sidebar-card{padding:.65rem .85rem;margin-bottom:.4rem;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;font-size:.82rem}
.sidebar-card:hover{background:var(--bg-alt);border-color:var(--border)}
.sidebar-card.active{background:var(--bg-alt);border-color:var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.75rem 1.5rem;max-width:1280px;margin:1rem auto 0}
.toolbar-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:white;cursor:pointer;transition:all .2s ease;color:var(--text-muted)}
.toolbar-btn:hover{background:var(--bg-alt);border-color:var(--text-light);color:var(--text)}
.toolbar-btn.active{background:var(--text);color:white;border-color:var(--text)}
.toolbar-label{font-size:.8rem;color:var(--text-light);font-weight:500;font-variant-numeric:tabular-nums}
.toolbar-sep{width:1px;height:22px;background:var(--border)}

/* Image styling */
.specimen-img{width:100%;height:100%;object-fit:cover;border-radius:8px;cursor:pointer;transition:transform .3s var(--transition),box-shadow .3s ease}
.specimen-img:hover{transform:scale(1.02);box-shadow:0 8px 32px rgba(0,0,0,.12)}
.img-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:var(--bg-alt);border-radius:8px;color:var(--text-light);font-size:.85rem;font-style:italic}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(12,10,9,.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:0;transition:opacity .3s ease;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-content{max-width:90vw;max-height:85vh;position:relative}
.modal-content img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:8px;box-shadow:0 16px 64px rgba(0,0,0,.4)}
.modal-caption{text-align:center;color:#D6D3CD;margin-top:1rem;font-size:.9rem;font-style:italic;max-width:600px;margin-left:auto;margin-right:auto;line-height:1.5}
.modal-close{position:absolute;top:-2.5rem;right:0;background:none;border:none;color:#A8A29E;cursor:pointer;font-size:1.5rem;transition:color .2s ease}
.modal-close:hover{color:white}

/* Chemical formulas */
.chem{font-family:var(--font-mono);font-size:.82em;background:rgba(0,0,0,.04);padding:.15em .4em;border-radius:4px;white-space:nowrap}
sub{font-size:.72em;vertical-align:sub}
sup{font-size:.72em;vertical-align:super}

/* Tag pills */
.tag{display:inline-block;padding:.2rem .6rem;border-radius:999px;font-size:.7rem;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.tag-meta{background:var(--meta-bg);color:var(--meta-blue)}
.tag-ign{background:var(--ign-bg);color:var(--ign-ochre)}
.tag-sed{background:var(--sed-bg);color:var(--sed-sage)}

/* Data table */
.data-table{width:100%;border-collapse:collapse;font-size:.78rem}
.data-table th{text-align:left;padding:.55rem .7rem;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text-light);border-bottom:2px solid var(--border);background:var(--bg-alt)}
.data-table td{padding:.5rem .7rem;border-bottom:1px solid var(--border-light);vertical-align:top;line-height:1.45}
.data-table tr:last-child td{border-bottom:none}

/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Print mode */
.print-mode .toolbar,.print-mode .sidebar,.print-mode .sidebar-overlay,.print-mode .sidebar-toggle,.print-mode .print-exit-bar,.print-mode .tip-bar{display:none!important}
.print-mode .slide-viewport{max-width:100%!important;margin:0!important}
.print-mode .slide-frame{border:none!important;border-radius:0!important;box-shadow:none!important;page-break-after:always;page-break-inside:avoid;height:100vh;padding-bottom:0!important}
.print-mode .slide-inner{position:relative!important;height:100vh}
.print-mode .slide-frame:last-child{page-break-after:auto}
@media print{
  @page{size:landscape;margin:.5cm}
  body{background:white!important}
  .toolbar,.sidebar,.sidebar-overlay,.sidebar-toggle,.tip-bar,.print-controls{display:none!important}
  .slide-frame{border:none!important;border-radius:0!important;box-shadow:none!important;page-break-after:always;page-break-inside:avoid;height:100vh;padding-bottom:0!important}
  .slide-inner{position:relative!important;height:100vh}
}

/* Responsive */
@media(max-width:768px){
  .slide-inner{padding:1.2rem}
  .toolbar{flex-wrap:wrap;gap:.5rem}
  .sidebar{width:260px}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ────────────────────────── ICON HELPER ────────────────────────── */
function Icon({ name, size = 18, className = '', ...props }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ nodes: [el], attrs: { width: size, height: size } });
    }
  }, [name, size]);
  return <span ref={ref} className={className} style={{ display: 'inline-flex', alignItems: 'center', lineHeight: 0 }} {...props} />;
}

/* ────────────────────── GEOLOGIC SVG BACKGROUNDS ──────────────── */
function GeologicBackground({ type }) {
  if (type === 'metamorphic') {
    // Wavy parallel undulating lines — lepidoblastic schistosity
    const lines = [];
    for (let i = 0; i < 14; i++) {
      const y = 40 + i * 50;
      const d = `M0 ${y} Q160 ${y - 18 + (i % 3) * 8},320 ${y + 6} T640 ${y - 4} T960 ${y + 10} T1280 ${y - 2}`;
      lines.push(<path key={i} d={d} fill="none" stroke="#64748B" strokeWidth="1.2" opacity={0.04 + (i % 3) * 0.005}/>);
    }
    return <svg viewBox="0 0 1280 720" style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>{lines}</svg>;
  }
  if (type === 'igneous') {
    // Interlocking polygonal crystal lattice
    const polys = [];
    const centers = [[160,120],[400,90],[640,180],[880,100],[1100,160],[100,360],[350,320],[580,400],[820,340],[1050,380],[200,560],[450,520],[700,600],[950,540],[1150,620],[50,200],[300,650],[550,250],[780,580],[1000,250]];
    centers.forEach(([cx,cy],i) => {
      const n = 5 + (i % 3);
      const r = 40 + (i % 4) * 12;
      const pts = Array.from({length:n},(_,j)=>{
        const a = (j/n)*Math.PI*2 + i*.3;
        return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
      }).join(' ');
      polys.push(<polygon key={i} points={pts} fill="none" stroke="#92400E" strokeWidth="1" opacity={0.035 + (i%3)*0.005}/>);
    });
    return <svg viewBox="0 0 1280 720" style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>{polys}</svg>;
  }
  if (type === 'sedimentary') {
    // Concentric spindle-shaped fusulinid chamber outlines with septa
    const shapes = [];
    const fus = [[200,180],[600,350],[1000,200],[350,550],[800,580],[150,420],[1100,400],[500,150],[900,450],[1200,280]];
    fus.forEach(([cx,cy],i) => {
      const rx = 50 + (i%3)*15;
      const ry = 22 + (i%2)*8;
      const rot = -20 + (i%5)*12;
      for (let r = 0; r < 3; r++) {
        const s = 1 - r * 0.28;
        shapes.push(<ellipse key={`${i}-${r}`} cx={cx} cy={cy} rx={rx*s} ry={ry*s} fill="none" stroke="#3F6212" strokeWidth="0.8" opacity={0.03 + r*0.005} transform={`rotate(${rot} ${cx} ${cy})`}/>);
      }
      // septa lines
      for (let s = 0; s < 4; s++) {
        const a = (s/4)*Math.PI + rot*Math.PI/180;
        shapes.push(<line key={`${i}-s${s}`} x1={cx} y1={cy} x2={cx+rx*0.7*Math.cos(a)} y2={cy+ry*0.7*Math.sin(a)} stroke="#3F6212" strokeWidth="0.5" opacity="0.025"/>);
      }
    });
    return <svg viewBox="0 0 1280 720" style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>{shapes}</svg>;
  }
  // Neutral / combined
  const els = [];
  for (let i = 0; i < 6; i++) {
    const y = 80 + i * 110;
    els.push(<path key={`w${i}`} d={`M0 ${y} Q320 ${y-15},640 ${y+10} T1280 ${y}`} fill="none" stroke="#78716C" strokeWidth="0.8" opacity="0.025"/>);
  }
  return <svg viewBox="0 0 1280 720" style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>{els}</svg>;
}

/* ────────────────────── IMAGE COMPONENT ────────────────────────── */
function SpecimenImage({ src, alt, caption, onClick, style = {} }) {
  const [err, setErr] = useState(false);
  const handleErr = () => setErr(true);
  if (err) return <div className="img-placeholder" style={style}><span>⬡ {alt || 'Specimen image'}</span></div>;
  return <img src={src} alt={alt} className="specimen-img" style={style} onError={handleErr} onClick={() => onClick && onClick({ src, alt, caption })} loading="lazy"/>;
}

/* ────────────────────────── IMAGE MODAL ────────────────────────── */
function ImageModal({ data, onClose }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);
  return (
    <div className={`modal-overlay ${data ? 'open' : ''}`} onClick={onClose}>
      {data && (
        <div className="modal-content" onClick={e => e.stopPropagation()}>
          <button className="modal-close" onClick={onClose}>✕</button>
          <img src={data.src} alt={data.alt} onError={e => { e.target.style.display='none'; }}/>
          {data.caption && <div className="modal-caption">{data.caption}</div>}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────── SLIDE DATA ────────────────────────────── */
const SLIDES = [
  { id:1, title:'High-Yield Lithological Triad', type:'neutral', short:'Title' },
  { id:2, title:'Phyllite — Overview', type:'metamorphic', short:'Phyllite Intro' },
  { id:3, title:'Phyllite — Specimen & Analysis', type:'metamorphic', short:'Phyllite Detail' },
  { id:4, title:'Essexite — Overview', type:'igneous', short:'Essexite Intro' },
  { id:5, title:'Essexite — Specimen & Analysis', type:'igneous', short:'Essexite Detail' },
  { id:6, title:'Permian Limestone — Overview', type:'sedimentary', short:'Limestone Intro' },
  { id:7, title:'Permian Limestone — Specimen & Analysis', type:'sedimentary', short:'Limestone Detail' },
  { id:8, title:'Comparative Litho-Analysis', type:'neutral', short:'Comparison' },
  { id:9, title:'Philippine Tectonic Framework', type:'neutral', short:'Tectonics' },
  { id:10, title:'Synthesis & Key References', type:'neutral', short:'Summary' },
];

function getTypeColor(type) {
  return type === 'metamorphic' ? 'var(--meta-blue)' : type === 'igneous' ? 'var(--ign-ochre)' : type === 'sedimentary' ? 'var(--sed-sage)' : 'var(--text-light)';
}
function getTagClass(type) {
  return type === 'metamorphic' ? 'tag-meta' : type === 'igneous' ? 'tag-ign' : type === 'sedimentary' ? 'tag-sed' : '';
}

/* ══════════════════════════ SLIDE COMPONENTS ══════════════════════ */

/* ── SLIDE 1: TITLE ─────────────────────────────────────────────── */
function SlideTitle() {
  return (
    <div style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',height:'100%',textAlign:'center',gap:'1.5rem'}}>
      <div className="anim-in" style={{fontSize:'.75rem',fontWeight:600,letterSpacing:'.15em',textTransform:'uppercase',color:'var(--text-light)'}}>
        Interactive Geological Presentation
      </div>
      <h1 className="anim-in anim-d1" style={{fontSize:'clamp(2rem,4.5vw,3.6rem)',fontWeight:800,lineHeight:1.1,letterSpacing:'-.02em',color:'var(--text)',maxWidth:'800px'}}>
        High-Yield Lithological Triad
      </h1>
      <div className="anim-in anim-d2" style={{width:'80px',height:'3px',background:'linear-gradient(90deg,var(--meta-blue),var(--ign-ochre),var(--sed-sage))',borderRadius:'2px'}}/>
      <p className="anim-in anim-d3" style={{fontSize:'clamp(1rem,1.8vw,1.35rem)',fontFamily:'var(--font-display)',fontWeight:400,fontStyle:'italic',color:'var(--text-muted)',maxWidth:'600px'}}>
        Phyllite &nbsp;·&nbsp; Essexite &nbsp;·&nbsp; Permian Limestone
      </p>
      <div className="anim-in anim-d4" style={{display:'flex',gap:'.75rem',marginTop:'.5rem'}}>
        <span className="tag tag-meta">Metamorphic</span>
        <span className="tag tag-ign">Igneous</span>
        <span className="tag tag-sed">Sedimentary</span>
      </div>
      <p className="anim-in anim-d5" style={{fontSize:'.8rem',color:'var(--text-light)',marginTop:'1.5rem',maxWidth:'500px',lineHeight:1.6}}>
        A publication-grade petrological portfolio featuring three high-yield lithological specimens from the Philippine archipelago — spanning metamorphic, igneous, and sedimentary domains.
      </p>
    </div>
  );
}

/* ── SLIDE 2: PHYLLITE OVERVIEW ─────────────────────────────────── */
function SlidePhylliteOverview() {
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:'1.2rem'}}>
      <div className="anim-in" style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
        <span className="tag tag-meta">Metamorphic</span>
        <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
        <span style={{fontSize:'.75rem',color:'var(--text-light)',fontWeight:500}}>Rock A</span>
      </div>
      <h2 className="anim-in anim-d1" style={{fontSize:'clamp(1.6rem,3vw,2.4rem)',letterSpacing:'-.01em'}}>Phyllite</h2>
      <div className="anim-in anim-d2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem',flex:1,minHeight:0}}>
        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          <div style={{padding:'1rem 1.2rem',background:'var(--meta-bg)',borderRadius:'10px',borderLeft:'3px solid var(--meta-blue)'}}>
            <h4 style={{fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--meta-blue)',marginBottom:'.4rem'}}>Classification</h4>
            <p style={{fontSize:'.85rem',lineHeight:1.55}}>Low-grade <strong>regional metamorphic rock</strong> formed at the lower-temperature boundary of the <strong>greenschist facies</strong>. Represents a transitional Barrovian stage between slate and schist.</p>
          </div>
          <div style={{padding:'1rem 1.2rem',background:'var(--meta-bg)',borderRadius:'10px',borderLeft:'3px solid var(--meta-blue)'}}>
            <h4 style={{fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--meta-blue)',marginBottom:'.4rem'}}>Thermodynamic Conditions</h4>
            <p style={{fontSize:'.85rem',lineHeight:1.55}}>
              Pressure: <strong>P ≈ 0.2–0.4 GPa</strong> (2–4 kbar)<br/>
              Temperature: <strong>T ≈ 300°C–400°C</strong><br/>
              Facies: Greenschist (lower boundary)
            </p>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          <div style={{padding:'1rem 1.2rem',background:'var(--meta-bg)',borderRadius:'10px',borderLeft:'3px solid var(--meta-blue)'}}>
            <h4 style={{fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--meta-blue)',marginBottom:'.4rem'}}>Key Characteristics</h4>
            <p style={{fontSize:'.85rem',lineHeight:1.55}}>Phyllite is distinguished by its diagnostic <strong>silky phyllitic sheen</strong> — a specular reflection produced by aligned microcrystalline sheet silicates (sericite and chlorite). This sheen is the defining macro-feature separating phyllite from the duller slate and the coarser schist.</p>
          </div>
          <div style={{padding:'1rem 1.2rem',background:'var(--meta-bg)',borderRadius:'10px',borderLeft:'3px solid var(--meta-blue)'}}>
            <h4 style={{fontSize:'.78rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--meta-blue)',marginBottom:'.4rem'}}>Tectonic Driver</h4>
            <p style={{fontSize:'.85rem',lineHeight:1.55}}>Philippine phyllites record the <strong>Miocene collision</strong> of the continental <strong>North Palawan Block (NPB)</strong> with the oceanic <strong>Philippine Mobile Belt (PMB)</strong>, generating the compressive stress and thermal gradients required for low-grade metamorphism.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── SLIDE 3: PHYLLITE DETAIL ───────────────────────────────────── */
function SlidePhylliteDetail({ onImageClick }) {
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:'1rem'}}>
      <div className="anim-in" style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
        <span className="tag tag-meta">Metamorphic</span>
        <h3 style={{fontSize:'1.15rem'}}>Phyllite — Specimen & Mineralogy</h3>
      </div>
      <div className="anim-in anim-d1" style={{display:'grid',gridTemplateColumns:'1fr 1.3fr',gap:'1.2rem',flex:1,minHeight:0}}>
        {/* Image pane */}
        <div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
          <div style={{flex:1,borderRadius:'10px',overflow:'hidden',position:'relative',minHeight:'200px'}}>
            <SpecimenImage src="images/phyllite.jpg" alt="Phyllite hand sample" caption="Phyllite hand specimen exhibiting characteristic silky phyllitic sheen from aligned sericite and chlorite microcrystals. Note the wavy crenulation cleavage surfaces with specular lustre." onClick={onImageClick}/>
          </div>
          <div style={{fontSize:'.72rem',color:'var(--text-light)',fontStyle:'italic',textAlign:'center',lineHeight:1.4}}>
            Hand specimen — silky phyllitic sheen with wavy crenulation cleavage
          </div>
        </div>
        {/* Data pane */}
        <div style={{display:'flex',flexDirection:'column',gap:'.7rem',overflow:'auto'}}>
          <div>
            <h4 style={{fontSize:'.75rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--meta-blue)',marginBottom:'.35rem'}}>Essential Mineralogy</h4>
            <div style={{fontSize:'.82rem',lineHeight:1.65}}>
              <div style={{display:'flex',gap:'.5rem',marginBottom:'.25rem'}}>
                <span style={{fontWeight:600,minWidth:'80px'}}>Sericite</span>
                <span className="chem">KAl<sub>2</sub>(AlSi<sub>3</sub>O<sub>10</sub>)(OH)<sub>2</sub></span>
              </div>
              <div style={{display:'flex',gap:'.5rem',marginBottom:'.25rem'}}>
                <span style={{fontWeight:600,minWidth:'80px'}}>Chlorite</span>

        <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>

            <h4 style={{fontSize:'.85rem',color:'var(--meta-blue)'}}>Continental Collision</h4>
          </div>
          <p style={{fontSize:'.78rem',lineHeight:1.6,flex:1}}>
            The <strong>Miocene collision</strong> of the continental <strong>North Palawan Block (NPB)</strong> with the oceanic <strong>Philippine Mobile Belt (PMB)</strong> generated regional compressive stress and thermal gradients. These conditions drove low-grade metamorphism, converting pelitic protoliths (shales/mudstones) into phyllites at the greenschist–prehnite-pumpellyite transition.
          </p>
          <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
            <span className="tag tag-meta">Phyllite</span>
            <span style={{fontSize:'.7rem',color:'var(--meta-blue)',fontWeight:500}}>← Product</span>
          </div>
        </div>
        {/* Back-arc Rifting */}
        <div style={{padding:'1.2rem',background:'var(--ign-bg)',borderRadius:'12px',border:'1px solid rgba(146,64,14,.12)',display:'flex',flexDirection:'column',gap:'.7rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
            <div style={{width:'32px',height:'32px',borderRadius:'8px',background:'var(--ign-ochre)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:'.8rem',fontWeight:700}}>2</div>
            <h4 style={{fontSize:'.85rem',color:'var(--ign-ochre)'}}>Back-Arc Rifting</h4>
          </div>
          <p style={{fontSize:'.78rem',lineHeight:1.6,flex:1}}>
            <strong>Northern Luzon back-arc extension</strong> facilitated the ascent of alkaline, silica-undersaturated magmas from a metasomatized mantle wedge. These magmas crystallized at depth as essexitic plutons — the Didipio, Palali, and Cordon complexes. Post-crystallization hydrothermal activity generated world-class <strong>Cu–Au porphyry</strong> and <strong>Au–Mo epithermal</strong> mineralization.
          </p>
          <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
            <span className="tag tag-ign">Essexite</span>
            <span style={{fontSize:'.7rem',color:'var(--ign-ochre)',fontWeight:500}}>← Product</span>
          </div>
        </div>
        {/* Cathaysia Drift */}
        <div style={{padding:'1.2rem',background:'var(--sed-bg)',borderRadius:'12px',border:'1px solid rgba(63,98,18,.12)',display:'flex',flexDirection:'column',gap:'.7rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
            <div style={{width:'32px',height:'32px',borderRadius:'8px',background:'var(--sed-sage)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:'.8rem',fontWeight:700}}>3</div>
            <h4 style={{fontSize:'.85rem',color:'var(--sed-sage)'}}>Passive Margin Drift</h4>
          </div>
          <p style={{fontSize:'.78rem',lineHeight:1.6,flex:1}}>
            Permian fusulinid limestones were originally deposited on the southeastern <strong>Cathaysian passive margin</strong> (South China). During the <strong>Oligocene–Miocene</strong> opening of the South China Sea (<strong>32–17 Ma</strong>), the limestone-bearing North Palawan Block was rifted away, drifted south as a continental ribbon, and collided with the PMB — juxtaposing Permian carbonates against Cenozoic arc rocks.
          </p>
          <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
            <span className="tag tag-sed">Limestone</span>
            <span style={{fontSize:'.7rem',color:'var(--sed-sage)',fontWeight:500}}>← Product</span>
          </div>
        </div>
      </div>
      <div className="anim-in anim-d3" style={{padding:'.8rem 1rem',background:'var(--bg-alt)',borderRadius:'8px',fontSize:'.78rem',color:'var(--text-muted)',lineHeight:1.55,textAlign:'center'}}>
        <strong>Unifying thread:</strong> All three lithologies are intimately linked to the tectonic evolution of the Philippine archipelago — collision metamorphism, back-arc magmatism, and passive-margin carbonate sedimentation converge within one geological province.
      </div>
    </div>
  );
}

/* ═══════════════════════ MAIN APP ═══════════════════════════════ */
function App() {
  const [current, setCurrent] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [playing, setPlaying] = useState(false);
  const [modalData, setModalData] = useState(null);
  const [printMode, setPrintMode] = useState(false);
  const [slideKey, setSlideKey] = useState(0);
  const timerRef = useRef(null);
  const total = SLIDES.length;

  const goTo = useCallback((idx) => {
    if (idx >= 0 && idx < total) {
      setCurrent(idx);
      setSlideKey(k => k + 1);
    }
  }, [total]);

  const next = useCallback(() => goTo((current + 1) % total), [current, total, goTo]);
  const prev = useCallback(() => goTo((current - 1 + total) % total), [current, total, goTo]);

  // Auto-play
  useEffect(() => {
    if (playing) {
      timerRef.current = setInterval(next, 6000);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [playing, next]);

  // Keyboard
  useEffect(() => {
    const handler = (e) => {
      if (modalData && e.key === 'Escape') { setModalData(null); return; }
      if (e.key === 'Escape') { setSidebarOpen(false); return; }
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === ' ') { e.preventDefault(); setPlaying(p => !p); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [next, prev, modalData]);

  // Print mode handler
  const handlePrint = () => {
    setPrintMode(true);
    setTimeout(() => {
      window.print();
      setPrintMode(false);
    }, 500);
  };

  const openImage = (data) => setModalData(data);

  // Render current slide
  const renderSlide = (idx) => {
    switch(idx) {
      case 0: return <SlideTitle/>;
      case 1: return <SlidePhylliteOverview/>;
      case 2: return <SlidePhylliteDetail onImageClick={openImage}/>;
      case 3: return <SlideEssexiteOverview/>;
      case 4: return <SlideEssexiteDetail onImageClick={openImage}/>;
      case 5: return <SlideLimestoneOverview/>;
      case 6: return <SlideLimestoneDetail onImageClick={openImage}/>;
      case 7: return <SlideComparison/>;
      case 8: return <SlideTectonics/>;
      case 9: return <SlideSummary/>;
      default: return null;
    }
  };

  /* ── PRINT MODE: all slides sequentially ── */
  if (printMode) {
    return (
      <div className="print-mode" style={{padding:'0'}}>
        {SLIDES.map((s, i) => (
          <div key={i} className="slide-viewport" style={{marginBottom:0}}>
            <div className="slide-frame" style={{pageBreakAfter: i < total-1 ? 'always' : 'auto'}}>
              <GeologicBackground type={s.type}/>
              <div className="slide-inner">
                {renderSlide(i)}
              </div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  /* ── NORMAL MODE ── */
  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',justifyContent:'center',padding:'1.5rem 1rem'}}>
      {/* Sidebar overlay */}
      <div className={`sidebar-overlay ${sidebarOpen ? 'visible' : ''}`} onClick={() => setSidebarOpen(false)}/>

      {/* Sidebar */}
      <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.2rem'}}>
          <h3 style={{fontSize:'.9rem',fontWeight:700}}>Slides</h3>
          <button onClick={() => setSidebarOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-light)',fontSize:'1.1rem'}}>✕</button>
        </div>
        {SLIDES.map((s, i) => (
          <div key={i} className={`sidebar-card ${i === current ? 'active' : ''}`} onClick={() => { goTo(i); setSidebarOpen(false); }}>
            <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.25rem'}}>
              <span style={{fontSize:'.72rem',fontWeight:700,color:getTypeColor(s.type),fontVariantNumeric:'tabular-nums'}}>{String(i+1).padStart(2,'0')}</span>
              <span style={{fontSize:'.78rem',fontWeight:600}}>{s.short}</span>
            </div>
            <div style={{fontSize:'.68rem',color:'var(--text-light)'}}>{s.title}</div>
          </div>
        ))}
      </div>

      {/* Slide viewport */}
      <div className="slide-viewport">
        <div className="slide-frame">
          <GeologicBackground type={SLIDES[current].type}/>
          <div className="slide-inner" key={slideKey} style={{animation:'fadeInUp .5s cubic-bezier(.4,0,.2,1) both'}}>
            {renderSlide(current)}
          </div>
        </div>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <button className="toolbar-btn" onClick={() => setSidebarOpen(o => !o)} title="Slide index">
          <Icon name="list" size={16}/>
        </button>
        <div className="toolbar-sep"/>
        <button className="toolbar-btn" onClick={prev} title="Previous (←)">
          <Icon name="chevron-left" size={16}/>
        </button>
        <span className="toolbar-label" style={{minWidth:'50px',textAlign:'center'}}>
          {current + 1} / {total}
        </span>
        <button className="toolbar-btn" onClick={next} title="Next (→)">
          <Icon name="chevron-right" size={16}/>
        </button>
        <div className="toolbar-sep"/>
        <button className={`toolbar-btn ${playing ? 'active' : ''}`} onClick={() => setPlaying(p => !p)} title="Auto-play (Space)">
          <Icon name={playing ? 'pause' : 'play'} size={14}/>
        </button>
        <div className="toolbar-sep"/>
        <button className="toolbar-btn" onClick={handlePrint} title="Export to PDF" style={{gap:'.35rem',width:'auto',paddingLeft:'.7rem',paddingRight:'.7rem'}}>
          <Icon name="printer" size={14}/>
          <span style={{fontSize:'.72rem',fontWeight:500}}>PDF</span>
        </button>
      </div>

      {/* Tip bar */}
      <div className="tip-bar" style={{textAlign:'center',marginTop:'.6rem',fontSize:'.7rem',color:'var(--text-light)',opacity:.7}}>
        Navigate: ← → arrows &nbsp;·&nbsp; Space: play/pause &nbsp;·&nbsp; Esc: close panels &nbsp;·&nbsp; Click images to zoom
      </div>

      {/* Image Modal */}
      <ImageModal data={modalData} onClose={() => setModalData(null)}/>
    </div>
  );
}

/* ── MOUNT ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
